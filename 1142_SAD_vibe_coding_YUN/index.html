<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetPaw｜寵物分享交流平台</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft JhengHei", sans-serif;
    }

    body {
      background: #DCDDDF;
      color: #444;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      transition: .3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .hidden {
      display: none !important;
    }

    /* Navbar */

    nav {
      width: 100%;
      background: #75809C;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .1);
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: white;
    }

    .nav-links {
      display: flex;
      gap: 15px;
    }

    .nav-links button {
      padding: 10px 16px;
      border-radius: 12px;
      background: white;
      color: #75809C;
      font-weight: bold;
    }

    /* Container */

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 25px;
    }

    /* Card */

    .card {
      background: white;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
      margin-bottom: 25px;
      animation: fade .5s;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Form */

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 2px solid #8E9BAE;
      border-radius: 12px;
      outline: none;
    }

    textarea {
      resize: none;
      min-height: 120px;
    }

    .main-btn {
      background: #8E9BAE;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
    }

    .secondary-btn {
      background: #DCDDDF;
      color: #555;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
    }

    /* Auth */

    .auth-box {
      max-width: 450px;
      margin: 40px auto;
    }

    .center {
      text-align: center;
    }

    /* Profile */

    .profile {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #8E9BAE;
    }

    .small-avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      object-fit: cover;
    }

    .post-image {
      width: 100%;
      margin-top: 15px;
      border-radius: 15px;
      max-height: 400px;
      object-fit: cover;
    }

    /* Post */

    .post-header {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 15px;
    }

    .post-actions {
      display: flex;
      gap: 20px;
      margin-top: 15px;
      font-size: 18px;
    }

    .post-actions span {
      cursor: pointer;
    }

    .comment-box {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }

    .comment {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .comment-content {
      background: #DCDDDF;
      padding: 10px;
      border-radius: 12px;
      width: 100%;
    }

    .flex {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    footer {
      margin-top: 40px;
      background: #8E9BAE;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .preview {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      margin-top: 10px;
      border-radius: 12px;
    }

    @media(max-width:768px) {

      nav {
        flex-direction: column;
        gap: 15px;
      }

      .profile {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->

  <nav>
    <div class="logo">🐾 PetPaw</div>

    <div class="nav-links">
      <button onclick="showPage('feedPage')">分享區</button>
      <button onclick="showPage('profilePage')">個人首頁</button>
      <button onclick="logout()">登出</button>
    </div>
  </nav>

  <div class="container">

    <!-- Login -->

    <section id="loginPage" class="auth-box card">

      <h2 class="center">會員登入</h2>

      <div class="form-group">
        <label>ID</label>
        <input type="text" id="loginId">
      </div>

      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="loginPassword">
      </div>

      <button class="main-btn" onclick="login()">登入</button>

      <br><br>

      <p class="center">
        沒有帳號？
        <a href="#" onclick="showPage('registerPage')" style="color:#75809C;">
          前往註冊
        </a>
      </p>

    </section>

    <!-- Register -->

    <section id="registerPage" class="auth-box card hidden">

      <h2 class="center">會員註冊</h2>

      <div class="form-group">
        <label>ID</label>
        <input type="text" id="registerId">
      </div>

      <div class="form-group">
        <label>名稱</label>
        <input type="text" id="registerName">
      </div>

      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="registerPassword">
      </div>

      <div class="form-group">
        <label>上傳頭貼</label>
        <input type="file" id="registerAvatar" accept="image/*">
      </div>

      <button class="main-btn" onclick="register()">註冊</button>

      <br><br>

      <p class="center">
        已有帳號？
        <a href="#" onclick="showPage('loginPage')" style="color:#75809C;">
          返回登入
        </a>
      </p>

    </section>

    <!-- Profile -->

    <section id="profilePage" class="hidden">

      <div class="card profile">

        <img id="profileAvatar" class="avatar">

        <div>
          <h2 id="profileName"></h2>
          <p id="profileId"></p>
          <p id="profilePosts"></p>
        </div>

      </div>

      <div class="card">

        <div class="flex">
          <button class="main-btn" onclick="showPage('createPostPage')">
            ＋ 新增貼文
          </button>

          <button class="secondary-btn" onclick="showPage('feedPage')">
            查看分享區
          </button>
        </div>

      </div>

      <div id="myPosts"></div>

    </section>

    <!-- Create Post -->

    <section id="createPostPage" class="hidden">

      <div class="card">

        <h2>新增貼文</h2>

        <br>

        <div class="post-header">

          <img id="createAvatar" class="small-avatar">

          <div>
            <strong id="createUserId"></strong>
          </div>

        </div>

        <div class="form-group">
          <label>發布主題</label>
          <input type="text" id="postTitle">
        </div>

        <div class="form-group">
          <label>發布內容</label>
          <textarea id="postContent"></textarea>
        </div>

        <div class="form-group">
          <label>上傳照片</label>
          <input type="file" id="postImage" accept="image/*">
          <img id="previewImage" class="preview hidden">
        </div>

        <div class="flex">
          <button class="main-btn" onclick="createPost()">
            發布貼文
          </button>

          <button class="secondary-btn" onclick="showPage('profilePage')">
            返回首頁
          </button>
        </div>

      </div>

    </section>

    <!-- Feed -->

    <section id="feedPage" class="hidden">

      <div id="feedPosts"></div>

    </section>

  </div>

  <footer>
    © 2026 PetPaw 寵物分享交流平台
  </footer>

  <script>

    // 資料初始化

    let users = JSON.parse(localStorage.getItem("users")) || [];
    let posts = JSON.parse(localStorage.getItem("posts")) || [];
    let currentUser = JSON.parse(localStorage.getItem("currentUser"));

    // 頁面切換

    function showPage(pageId) {

      const pages = [
        "loginPage",
        "registerPage",
        "profilePage",
        "createPostPage",
        "feedPage"
      ];

      pages.forEach(page => {
        document.getElementById(page).classList.add("hidden");
      });

      document.getElementById(pageId).classList.remove("hidden");

      if (pageId === "feedPage") {
        renderFeed();
      }

      if (pageId === "profilePage") {
        renderProfile();
      }
    }

    // 註冊

    function register() {

      const id = document.getElementById("registerId").value;
      const name = document.getElementById("registerName").value;
      const password = document.getElementById("registerPassword").value;
      const avatarFile = document.getElementById("registerAvatar").files[0];

      if (!id || !name || !password) {
        alert("請完整填寫資料");
        return;
      }

      const exist = users.find(user => user.id === id);

      if (exist) {
        alert("ID 已存在");
        return;
      }

      // 雙重驗證 (註冊)
      const verifyCode = Math.floor(1000 + Math.random() * 9000).toString();
      alert(`【系統提示】您的註冊驗證碼為：${verifyCode}`);
      const inputCode = prompt("請輸入驗證碼進行雙重驗證：");

      if (inputCode !== verifyCode) {
        alert("驗證碼錯誤，註冊失敗！");
        return;
      }


      const reader = new FileReader();

      reader.onload = function (e) {

        const user = {
          id,
          name,
          password,
          avatar: e.target.result
        };

        users.push(user);

        localStorage.setItem("users", JSON.stringify(users));

        alert("註冊成功");

        showPage("loginPage");
      };

      if (avatarFile) {
        reader.readAsDataURL(avatarFile);
      } else {
        reader.onload({
          target: {
            result: "https://cdn-icons-png.flaticon.com/512/616/616408.png"
          }
        });
      }
    }

    // 登入

    function login() {

      const id = document.getElementById("loginId").value;
      const password = document.getElementById("loginPassword").value;

      const user = users.find(
        user => user.id === id && user.password === password
      );

      if (!user) {
        alert("登入失敗");
        return;
      }

      // 雙重驗證 (登入)
      const verifyCode = Math.floor(1000 + Math.random() * 9000).toString();
      alert(`【系統提示】您的登入驗證碼為：${verifyCode}`);
      const inputCode = prompt("請輸入驗證碼進行雙重驗證：");

      if (inputCode !== verifyCode) {
        alert("驗證碼錯誤，登入失敗！");
        return;
      }

      currentUser = user;

      localStorage.setItem(
        "currentUser",
        JSON.stringify(user)
      );

      renderProfile();

      showPage("profilePage");
    }

    // 登出

    function logout() {

      localStorage.removeItem("currentUser");

      currentUser = null;

      showPage("loginPage");
    }

    // 個人首頁

    function renderProfile() {

      if (!currentUser) {
        showPage("loginPage");
        return;
      }

      document.getElementById("profileAvatar").src = currentUser.avatar;
      document.getElementById("profileName").innerText = currentUser.name;
      document.getElementById("profileId").innerText = "@" + currentUser.id;

      const myPosts = posts.filter(
        post => post.userId === currentUser.id
      );

      document.getElementById("profilePosts").innerText =
        "貼文數：" + myPosts.length;

      document.getElementById("createAvatar").src = currentUser.avatar;
      document.getElementById("createUserId").innerText = currentUser.id;

      const container = document.getElementById("myPosts");

      container.innerHTML = "";

      myPosts.reverse().forEach(post => {
        container.innerHTML += generatePostHTML(post);
      });
    }

    // 圖片預覽

    document.getElementById("postImage")
      .addEventListener("change", function () {

        const file = this.files[0];

        if (file) {

          const reader = new FileReader();

          reader.onload = function (e) {

            const preview = document.getElementById("previewImage");

            preview.src = e.target.result;
            preview.classList.remove("hidden");
          };

          reader.readAsDataURL(file);
        }
      });

    // 發布貼文

    function createPost() {

      const title = document.getElementById("postTitle").value;
      const content = document.getElementById("postContent").value;
      const imageFile = document.getElementById("postImage").files[0];

      if (!title || !content) {
        alert("請輸入主題與內容");
        return;
      }

      const reader = new FileReader();

      reader.onload = function (e) {

        const post = {
          id: Date.now(),
          userId: currentUser.id,
          userName: currentUser.name,
          userAvatar: currentUser.avatar,
          title,
          content,
          image: e.target.result || "",
          likes: [],
          comments: [],
          time: new Date().toLocaleString()
        };

        posts.unshift(post);

        localStorage.setItem(
          "posts",
          JSON.stringify(posts)
        );

        alert("發文成功！");

        document.getElementById("postTitle").value = "";
        document.getElementById("postContent").value = "";
        document.getElementById("postImage").value = "";
        document.getElementById("previewImage").classList.add("hidden");

        renderFeed();
        renderProfile();

        showPage("feedPage");
      };

      if (imageFile) {
        reader.readAsDataURL(imageFile);
      } else {
        reader.onload({
          target: {
            result: ""
          }
        });
      }
    }

    // 刪除貼文

    function deletePost(postId) {
      if (!confirm("確定要刪除這篇貼文嗎？")) return;

      posts = posts.filter(post => post.id !== postId);
      localStorage.setItem("posts", JSON.stringify(posts));

      renderFeed();
      if (currentUser) {
        renderProfile();
      }
      alert("貼文已刪除！");
    }

    // 產生貼文HTML

    function generatePostHTML(post) {

      return `
        <div class="card">

          <div class="post-header">

            <img src="${post.userAvatar}" class="small-avatar">

            <div>
              <strong>${post.userId}</strong>
              <p>${post.time}</p>
            </div>
            
            ${currentUser && currentUser.id === post.userId ? `
            <button onclick="deletePost(${post.id})" style="margin-left:auto; background:#ff8ea1; color:white; padding:5px 10px; border-radius:8px; font-size:14px; border:none; cursor:pointer; transition:0.3s;">
              刪除
            </button>
            ` : ''}

          </div>

          <h3>${post.title}</h3>

          <br>

          <p>${post.content}</p>

          ${post.image
          ?
          `<img src="${post.image}" class="post-image">`
          :
          ""
        }

          <div class="post-actions">

            <span onclick="toggleLike(${post.id})">
              ❤️ ${post.likes.length}
            </span>

            <span>
              💬 ${post.comments.length}
            </span>

          </div>

          <div class="comment-box">

            ${currentUser
          ?
          `
              <div class="flex">

                <input
                  type="text"
                  id="comment-${post.id}"
                  placeholder="輸入留言..."
                  style="flex:1;padding:10px;border-radius:10px;border:1px solid #ccc;"
                >

                <button
                  class="main-btn"
                  onclick="addComment(${post.id})"
                >
                  送出
                </button>

              </div>
              `
          :
          `
              <input
                type="text"
                placeholder="登入後才能留言"
                onclick="needLogin()"
                style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;"
                readonly
              >
              `
        }

            ${post.comments.map(comment => `

                <div class="comment">

                  <img src="${comment.avatar}" class="small-avatar">

                  <div class="comment-content">

                    <strong>${comment.userId}</strong>

                    <p>${comment.text}</p>

                    <small>${comment.time}</small>

                  </div>

                </div>

              `).join("")
        }

          </div>

        </div>
      `;
    }

    // 分享區

    function renderFeed() {

      const container = document.getElementById("feedPosts");

      container.innerHTML = "";

      posts.forEach(post => {
        container.innerHTML += generatePostHTML(post);
      });
    }

    // 按讚

    function toggleLike(postId) {

      if (!currentUser) {
        alert("請先登入會員");
        return;
      }

      const post = posts.find(post => post.id === postId);

      const index = post.likes.indexOf(currentUser.id);

      if (index > -1) {
        post.likes.splice(index, 1);
      } else {
        post.likes.push(currentUser.id);
      }

      localStorage.setItem(
        "posts",
        JSON.stringify(posts)
      );

      renderFeed();
      renderProfile();
    }

    // 留言

    function addComment(postId) {

      if (!currentUser) {
        needLogin();
        return;
      }

      const input = document.getElementById(`comment-${postId}`);

      const text = input.value;

      if (!text) {
        return;
      }

      const post = posts.find(post => post.id === postId);

      post.comments.push({
        userId: currentUser.id,
        avatar: currentUser.avatar,
        text,
        time: new Date().toLocaleString()
      });

      localStorage.setItem(
        "posts",
        JSON.stringify(posts)
      );

      renderFeed();
      renderProfile();
    }

    // 未登入提示

    function needLogin() {

      const go = confirm(
        "是否已有平台帳號？\n按下確定前往登入"
      );

      if (go) {
        showPage("loginPage");
      } else {
        showPage("registerPage");
      }
    }

    // 初始化

    if (currentUser) {
      showPage("profilePage");
      renderProfile();
    } else {
      showPage("loginPage");
    }

  </script>

</body>

</html>
